# CronJob: integrity-jobs-cleanup
# Removes orphaned LFN input files from the PVC and deletes
# completed/failed Kubernetes jobs older than 24 hours.
# Runs every hour — less time-sensitive than log processing.
#
# Image: must match the Django deployment image.
# Update the image tag here when promoting from :test to :latest.
#
# Apply: kubectl apply -f controllers/cronjob_cleanup_jobs_integrity.yaml -n file-invalidation-tool

apiVersion: batch/v1
kind: CronJob
metadata:
  name: integrity-jobs-cleanup
  namespace: file-invalidation-tool
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Allow
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  suspend: false
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: job-runner
          containers:
            - name: integrity-cleanup
              image: registry.paas.cern.ch/file-invalidation-tool/file-invalidation-tool:test
              imagePullPolicy: IfNotPresent
              command:
                - python3
                - file_integrity_checker/cleanup_jobs.py
              env:
                - name: SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: django-secret-key
                      key: SECRET_KEY
                - name: JIRA_PAT
                  valueFrom:
                    secretKeyRef:
                      name: jira-pat
                      key: JIRA_PAT
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: django-db-name
                      key: DB_NAME
                - name: DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: django-db-host
                      key: DB_HOST
                - name: DB_PORT
                  valueFrom:
                    secretKeyRef:
                      name: django-db-port
                      key: DB_PORT
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: django-db-user
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: django-db-password
                      key: DB_PASSWORD
              volumeMounts:
                - name: integrity-input-file
                  mountPath: /shared-data-integrity
          volumes:
            - name: integrity-input-file
              persistentVolumeClaim:
                claimName: integrity-input-file-pvc