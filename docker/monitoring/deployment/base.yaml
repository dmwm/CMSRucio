# StorageClass used to point to CMS cvmfs
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: csi-cvmfs-cms
parameters:
  repository: cms.cern.ch
provisioner: cvmfs.csi.cern.ch
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
# PersistentVolumeClaim used to mount CMS cvmfs area in pods
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: csi-cvmfs-cms-pvc
  namespace: dmtops-crons
spec:
  accessModes:
  - ReadOnlyMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: csi-cvmfs-cms
---
# Service used to open node ports for Spark communication
# WARNING: The same ports can't be used in parallel for different spark-jobs
kind: Service
apiVersion: v1
metadata:
  name: dmtops-spark-svc
  namespace: dmtops-crons
spec:
  selector:
    app: dmtops-spark-svc
  type: NodePort
  ports:
    - name: port-0 # spark.driver.port, cern default is 5201
      nodePort: 31203
      port: 31203
      protocol: TCP
      targetPort: 31203
    - name: port-1 # spark.driver.blockManager.port
      nodePort: 31204
      port: 31204
      protocol: TCP
      targetPort: 31204
---
