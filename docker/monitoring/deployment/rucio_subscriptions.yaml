apiVersion: batch/v1
kind: CronJob
metadata:
  name: rucio-subscriptions
  namespace: dmtops-crons
spec:
  schedule: "0 6 * * *" 
  jobTemplate:   
    spec:
      template:
        metadata:
          labels:
            app: dmtops-spark-svc
        spec:
          containers:
          - name: rucio-subscriptions
            image: registry.cern.ch/cmsrucio/dmops-spark-crons:latest
            env:
            - name: DRIVERPORT
              value: "31203"
            - name: BMPORT
              value: "31204"
            - name: K8SHOST
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            command: ["/src/submit_rucio_subscriptions.sh"]
            ports:
            - containerPort: 31203 # spark.driver.port
              name: port-0
            - containerPort: 31204 # spark.driver.blockManager.port
              name: port-1
            volumeMounts:
              - name: dmtops-cron-secrets
                mountPath: /etc/secrets
                readOnly: true
          volumes:
          - name: dmtops-cron-secrets
            secret:
              secretName: dmtops-cron-secrets
          restartPolicy: OnFailure