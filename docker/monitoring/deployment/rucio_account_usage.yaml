apiVersion: batch/v1
kind: CronJob
metadata:
  name: rucio-account-usage
  namespace: dmtops-crons
spec:
  schedule: "*/5 * * * *" 
  jobTemplate:   
    spec:
      template:
        metadata:
          labels:
            app: dmtops-spark-svc-2
        spec:
          containers:
          - name: rucio-account-usage
            image: registry.cern.ch/cmsrucio/dmops-spark-crons:latest
            imagePullPolicy: Always
            env:
            - name: DRIVERPORT
              value: "31207"
            - name: BMPORT
              value: "31208"
            - name: K8SHOST
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            command: ["/src/submit_rucio_account_usage.sh"]
            ports:
            - containerPort: 31207 # spark.driver.port
              name: port-0
            - containerPort: 31208 # spark.driver.blockManager.port
              name: port-1
            volumeMounts:
              - name: dmtops-cron-secrets
                mountPath: /etc/secrets
                readOnly: true
          volumes:
          - name: dmtops-cron-secrets
            secret:
              secretName: dmtops-cron-secrets
          restartPolicy: OnFailure