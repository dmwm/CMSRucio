apiVersion: batch/v1
kind: CronJob
metadata:
  name: rucio-activity-account-usage
  namespace: dmtops-crons
spec:
  schedule: "13 3 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: dmtops-spark-svc-5
        spec:
          containers:
          - name: rucio-activity-usage
            image: registry.cern.ch/cmsrucio/dmops-spark-crons:latest
            imagePullPolicy: Always
            env:
            - name: DRIVERPORT
              value: "31215"
            - name: BMPORT
              value: "31216"
            - name: K8SHOST
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            command: ["/src/submit_rucio_activity_account_usage.sh"]
            ports:
            - containerPort: 31215 # spark.driver.port
              name: port-0
            - containerPort: 31216 # spark.driver.blockManager.port
              name: port-1
            volumeMounts:
              - name: dmtops-cron-secrets
                mountPath: /etc/secrets
                readOnly: true
          volumes:
          - name: dmtops-cron-secrets
            secret:
              secretName: dmtops-cron-secrets
          restartPolicy: OnFailure
